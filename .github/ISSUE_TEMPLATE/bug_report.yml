name: Bug report
description: Report a reproducible bug in PulseOrPerish
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Keep it short, but include enough details to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: Briefly describe the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run PulseOrPerish with ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      render: shell
      placeholder: Paste relevant logs **in debug mode**, stack traces, or HTTP responses.

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.2.3 or ghcr.io/...:latest or commit hash
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04, macOS 15, Windows 11, etc.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant flags/env vars (remove secrets).
      render: shell
      placeholder: |
        POP_LISTEN=:8080
        POP_INTERVAL=24h
        POP_DRY_RUN=false
