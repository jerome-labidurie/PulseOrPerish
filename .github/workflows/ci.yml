name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit-tests:
    name: Build + unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -ldflags="-X main.Version=dev" ./cmd/pulseorperish

      - name: Run unit tests (excluding e2e)
        shell: bash
        run: |
          set -euo pipefail
          pkgs="$(go list ./... | grep -v '/internal/testkit/e2e$')"
          go test $pkgs

  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: build-and-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker image (no push)
        run: docker build -t pulseorperish:ci-check .

  e2e-tests:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: build-and-unit-tests
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run e2e tests
        run: go test -v ./internal/testkit/e2e -timeout=15m
