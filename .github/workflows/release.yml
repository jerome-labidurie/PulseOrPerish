name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version label used in artifact names during manual runs
        required: false
        default: dry-run
        type: string
      publish:
        description: Publish release assets and push container image
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: pulseorperish
  RELEASE_VERSION: ${{ github.event_name == 'release' && github.ref_name || inputs.version }}
  PUBLISH_RELEASE: ${{ github.event_name == 'release' || inputs.publish }}

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p dist
          output="dist/pulseorperish_${VERSION}_${GOOS}_${GOARCH}${EXT}"
          BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          COMMIT=$(git rev-parse --short HEAD)
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.CommitHash=${COMMIT}" -o "$output" ./cmd/pulseorperish

      - name: Upload binary to GitHub release
        if: env.PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/pulseorperish_${{ env.RELEASE_VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}

  popcrypt:
    name: Build popcrypt release binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build popcrypt binary
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p dist
          output="dist/popcrypt_${VERSION}_linux_amd64"
          BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          COMMIT=$(git rev-parse --short HEAD)
          go build -trimpath -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.CommitHash=${COMMIT}" -o "$output" ./cmd/popcrypt

      - name: Upload popcrypt binary to GitHub release
        if: env.PUBLISH_RELEASE == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/popcrypt_${{ env.RELEASE_VERSION }}_linux_amd64

  docker:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        if: env.PUBLISH_RELEASE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ env.PUBLISH_RELEASE == 'true' }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
            CREATED=${{ github.event.release.published_at }}
            SOURCE_URL=https://github.com/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
